{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">

  <div class="auth-card">

    <div class="auth-header">
      <h2 id="authTitle">Login</h2>
      <p id="authSub">Login with your User ID + Email</p>
    </div>

    {% if registration_user_id %}
      <div class="card" style="margin-bottom:12px; background:#ecfeff;">
        <p><strong>Registration successful!</strong></p>
        <p>Your User ID: <code>{{ registration_user_id }}</code></p>
      </div>
    {% endif %}

    <form id="loginForm" method="POST" action="/login">
      <div class="input-group">
        <input name="user_id" required placeholder="User ID">
      </div>

      <div class="input-group">
        <input name="email" type="email" required placeholder="Email">
      </div>

      <button type="submit" class="btn btn-primary">Login</button>

      <p class="switch-text">
        Don't have an account?
        <span onclick="toggleAuth()">Register</span>
      </p>
    </form>

    <form id="registerForm" method="POST" action="/register" class="hidden">
        <div class="input-group">
            <input name="name" required placeholder="Name">
        </div>

        <div class="input-group">
            <input name="email" type="email" required placeholder="Email">
        </div>

        <button type="submit" class="btn btn-primary">Register</button>

        <p class="switch-text">
            Already have an account?
            <span onclick="toggleAuth()">Login</span>
        </p>

    </form>

  </div>

</div>

<script>
function toggleAuth() {
  const login = document.getElementById("loginForm");
  const register = document.getElementById("registerForm");
  const title = document.getElementById("authTitle");
  const sub = document.getElementById("authSub");

  login.classList.toggle("hidden");
  register.classList.toggle("hidden");

  if (login.classList.contains("hidden")) {
    title.innerText = "Register";
    sub.innerText = "Create your account (name + email)";
  } else {
    title.innerText = "Login";
    sub.innerText = "Login with your User ID + Email";
  }
}
</script>

{% endblock %}
