{% extends "base.html" %}
{% block content %}
<div class="auth-wrapper">

  <div class="auth-card card">

    <div class="auth-header" style="text-align: center; margin-bottom: 2rem;">
      <h2 id="authTitle" style="font-weight: 800; font-size: 2.25rem;">Login</h2>
      <p id="authSub" style="color: var(--text-muted);">Enter your credentials to continue.</p>
    </div>

    <form id="loginForm" method="POST" action="/login">
      <div class="input-group">
        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" required placeholder="name@example.com">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required placeholder="••••••••">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>

      <p class="switch-text" style="text-align: center; margin-top: 1.5rem;">
        Don't have an account?
        <span onclick="toggleAuth()" style="color: var(--primary); cursor: pointer; font-weight: 700;">Create one</span>
      </p>
    </form>

    <form id="registerForm" method="POST" action="/register" class="hidden">
      <div class="input-group">
        <label for="reg-name">Full Name</label>
        <input id="reg-name" name="name" required placeholder="John Doe">
      </div>

      <div class="input-group">
        <label for="reg-email">Email Address</label>
        <input id="reg-email" name="email" type="email" required placeholder="name@example.com">
      </div>

      <div class="input-group">
        <label for="reg-password">Password</label>
        <input id="reg-password" name="password" type="password" required placeholder="8+ characters">
      </div>

      <div class="input-group">
        <label for="reg-dob">Date of Birth</label>
        <input id="reg-dob" name="dob" type="date">
      </div>

      <div class="input-group">
        <label for="reg-gender">Gender</label>
        <select id="reg-gender" name="gender">
          <option value="" selected>Select Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="input-group">
        <label for="reg-bio">Tell us about yourself</label>
        <textarea id="reg-bio" name="bio" placeholder="What skills do you have? what do you want to learn?" rows="3"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>

      <p class="switch-text" style="text-align: center; margin-top: 1.5rem;">
        Already have an account?
        <span onclick="toggleAuth()" style="color: var(--primary); cursor: pointer; font-weight: 700;">Login instead</span>
      </p>
    </form>

  </div>

</div>

<script>
function toggleAuth(force) {
  const login = document.getElementById("loginForm");
  const register = document.getElementById("registerForm");
  const title = document.getElementById("authTitle");
  const sub = document.getElementById("authSub");

  if (force === "register") {
    login.classList.add("hidden");
    register.classList.remove("hidden");
  } else if (force === "login") {
    login.classList.remove("hidden");
    register.classList.add("hidden");
  } else {
    login.classList.toggle("hidden");
    register.classList.toggle("hidden");
  }

  if (login.classList.contains("hidden")) {
    title.innerText = "Join the Community";
    sub.innerText = "Create your account and start exchanging skills.";
  } else {
    title.innerText = "Welcome Back";
    sub.innerText = "Login with your credentials to continue.";
  }
}

{% if active_form == 'register' %}
toggleAuth("register");
{% elif active_form == 'login' %}
toggleAuth("login");
{% endif %}
</script>

<style>
  .auth-card {
    animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>

{% endblock %}
