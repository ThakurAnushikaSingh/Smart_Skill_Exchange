{% extends "base.html" %}
{% block content %}
<div class="profile-wrapper">
  <div class="profile-card card">
    <div class="auth-header" style="margin-bottom: 2rem;">
      <h2 style="font-weight: 800;">Add to Profile</h2>
      <p style="color: var(--text-muted);">Select a skill you want to offer or suggest a new one.</p>
    </div>

    <form method="POST" style="margin-top: 18px;">
      
      <div class="input-group">
        <label>Choose a Skill</label>
        <select name="skill_id" id="skillSelect" onchange="toggleNewSkill(this.value)" required>
          <option value="" disabled selected>-- Select an existing skill --</option>
          {% for skill in skills %}
            <option value="{{ skill.id }}">{{ skill.name }}</option>
          {% endfor %}
          <option value="new" style="font-weight: 700; color: var(--primary);">+ Add New Skill (Not in list)</option>
        </select>
      </div>

      <!-- Hidden by default, shown when 'new' is selected -->
      <div id="newSkillGroup" class="hidden">
        <div class="input-group">
          <label>New Skill Name</label>
          <input name="name" id="newSkillName" placeholder="e.g. Advanced React Hooks">
        </div>
        <div class="input-group">
          <label>Short Description</label>
          <textarea name="description" id="newSkillDesc" placeholder="Briefly describe this new skill..." rows="3"></textarea>
        </div>
      </div>

      <div class="input-group">
        <label>Your Proficiency</label>
        <select name="proficiency" required>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
          <option value="expert">Expert</option>
        </select>
      </div>

      <div class="input-group" style="display: flex; gap: 10px; align-items: center;">
        <input type="checkbox" name="can_teach" value="true" id="can_teach" checked> 
        <label for="can_teach" style="margin: 0; font-weight: 500;">I am ready to teach this skill</label>
      </div>

      <div class="actions" style="margin-top: 2.5rem; display: flex; flex-direction: column; gap: 1rem;">
        <button type="submit" class="btn btn-primary" style="width: 100%;">Add to My Profile</button>
        <a href="/my-dashboard" class="btn btn-secondary" style="width: 100%;">Back to Dashboard</a>
      </div>
    </form>
  </div>
</div>

<script>
function toggleNewSkill(val) {
  const newGroup = document.getElementById('newSkillGroup');
  const nameInput = document.getElementById('newSkillName');
  const descInput = document.getElementById('newSkillDesc');
  
  if (val === 'new') {
    newGroup.classList.remove('hidden');
    nameInput.setAttribute('required', 'required');
    descInput.setAttribute('required', 'required');
  } else {
    newGroup.classList.add('hidden');
    nameInput.removeAttribute('required');
    descInput.removeAttribute('required');
  }
}
</script>

{% endblock %}
