<!DOCTYPE html>
<html>
<head>
    <title>Learning Session</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; margin: 0; }
        .card {
            max-width: 700px;
            margin: 40px auto;
            background: white;
            padding: 24px;
            border-radius: 14px;
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
        }
        h1 { margin-top: 0; color: #4338ca; }
        .meeting { background: #eef2ff; padding: 12px; border-radius: 8px; }
        .btn {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            font-weight: 600;
        }
        .back { margin-left: 10px; color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>🎯 Live Session</h1>
    <p><b>Session ID:</b> {{ session_data.session_id }}</p>
    <p><b>Teacher ID:</b> {{ session_data.teacher_id }}</p>
    <p><b>Learner ID:</b> {{ session_data.learner_id }}</p>

    <div class="meeting">
        <b>Meeting URL:</b>
        <a href="{{ session_data.meeting_url }}" target="_blank">{{ session_data.meeting_url }}</a>
    </div>

    <a class="btn" href="{{ session_data.meeting_url }}" target="_blank">🎥 Join Meeting</a>
    <a class="back" href="/sessions">⬅ Back to Sessions</a>
</div>
</body>
</html>
