<!DOCTYPE html>
<html>
<head>
    <title>Learning Session</title>
</head>
<body>

<h1>🎯 Live Session</h1>

<p>Session ID: {{ session.session_id }}</p>

{% if session.trainer_id == session['trainer_id'] %}
    <h3>👨‍🏫 Trainer Panel</h3>
    <textarea placeholder="Explain the concept..."></textarea>
{% endif %}

{% if session.learner_id == session['learner_id'] %}
    <h3>👩‍🎓 Learner Notes</h3>
    <textarea placeholder="Write notes..."></textarea>
{% endif %}

<br><br>

<a href="https://meet.google.com" target="_blank">
    <button>🎥 Join Video Session</button>
</a>

<br><br>

<form method="POST" action="/complete_session">
    <input type="hidden" name="session_id" value="{{ session.session_id }}">
    <button type="submit">End Session</button>
</form>

<br><br>
<a href="/sessions">⬅ Back to Sessions</a>

</body>
</html>
