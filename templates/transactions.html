{% extends "base.html" %}
{% block content %}
<div class="skills-page">
  <h1>Transactions</h1>
  <div class="skills-grid">
    {% for t in transactions %}
    <div class="skill-card">
      <h3>{{ t.amount }} credits</h3>
      <p>From: {{ t.from_user_id }}</p>
      <p>To: {{ t.to_user_id }}</p>
      <p>Session: {{ t.session_id }}</p>
      <p>{{ t.created_at }}</p>
    </div>
    {% else %}
    <p class="switch-text">No transactions yet.</p>
    {% endfor %}
  </div>
</div>
{% endblock %}
