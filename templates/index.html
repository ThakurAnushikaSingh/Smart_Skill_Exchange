<!DOCTYPE html>
<html>
<head>
    <title>Smart Skill Exchange</title>
    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 40px;
        color: #333;
    }

    h1 {
        text-align: center;
        color: white;
        margin-bottom: 40px;
    }

    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
    }

    .card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        width: 300px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    h2 {
        margin-top: 0;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
        outline: none;
    }

    input:focus {
        border-color: #667eea;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.2s;
    }

    button:hover {
        background: #5a67d8;
    }
	</style>
</head>
<body>

    <!-- 🔐 IF USER LOGGED IN -->
		{% if session.user_id %}
		<div style="display:flex; justify-content:flex-end; margin-bottom:10px;">

			<div style="position:relative;">

				<button onclick="toggleMenu()" style="padding:8px 12px;">
					👤 {{ session.name }}
				</button>

				<div id="menu" style="display:none; position:absolute; right:0; background:white; padding:10px; border-radius:6px;">
					<a href="/profile">My Profile</a><br><br>
					<a href="/certificates">My Certificates</a><br><br>
					<a href="/transactions">Transaction History</a><br><br>
					<a href="/logout">Logout</a>
				</div>

			</div>

		</div>

		<script>
		function toggleMenu() {
			var menu = document.getElementById("menu");
			menu.style.display = (menu.style.display === "none") ? "block" : "none";
		}
		</script>

        <!-- Top Bar -->
        <div style="display:flex; justify-content:space-between; color:white; margin-bottom:10px;">
            <div>👋 Welcome, {{ session.name }}</div>
            <div><a href="/logout" style="color:white;">Logout</a></div>
        </div>

        <h1>Smart Skill Exchange Platform</h1>

       <div class="container">

			<!-- Add Skill -->
			<div class="card">
				<h2>🧠 Add Skill</h2>
				<a href="/add-skill">
					<button>Add Skill</button>
				</a>
			</div>

			<!-- Request Skill -->
			<div class="card">
				<h2>📩 Request Skill</h2>
				<a href="/request-skill">
					<button>Request</button>
				</a>
			</div>

			<!-- Complete Session -->
			<div class="card">
				<h2>🎯 Complete Session</h2>
				<a href="/complete-session-page">
					<button>Complete</button>
				</a>
			</div>

		</div>

        <div style="text-align:center; margin-top: 30px;">
            <a href="/sessions">
                <button>📚 View Sessions</button>
            </a>
        </div>

    <!-- 🔓 IF USER NOT LOGGED IN -->
    {% else %}

        <h1>Smart Skill Exchange Platform</h1>

        <div class="container">

            <!-- Register -->
            <div class="card">
                <h2>👤 Register</h2>
                <form method="POST" action="/users">
                    <input type="text" name="name" placeholder="Enter Name" required>
                    <input type="email" name="email" placeholder="Enter Email" required>
                    <button type="submit">Register</button>
                </form>
            </div>

            <!-- Login -->
            <div class="card">
				<h2>🔑 Login</h2>
				<form method="POST" action="/login">
					<input type="number" name="user_id" placeholder="Enter User ID" required>
					<input type="email" name="email" placeholder="Enter Email" required>
					<button type="submit">Login</button>
				</form>
			</div>

        </div>

    {% endif %}

</body>
</html>
